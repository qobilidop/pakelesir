name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Same image dev.sh builds; layers cached in the Actions cache.
      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          tags: pakeles-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore cargo caches
        uses: actions/cache@v4
        with:
          path: |
            .ci/cargo-registry
            .ci/target
          key: cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: cargo-

      # Mirrors dev.sh mounts, with host dirs standing in for its volumes.
      - name: Gate
        run: |
          mkdir -p .ci/cargo-registry .ci/target
          docker run --rm \
            -v "$PWD":/work -w /work \
            -v "$PWD/.ci/target":/target \
            -v "$PWD/.ci/cargo-registry":/usr/local/cargo/registry \
            pakeles-dev \
            sh -c 'cargo fmt --check && cargo clippy --all-targets -- -D warnings && cargo test && buf lint && cd py && ruff check . && pyright && pytest'
