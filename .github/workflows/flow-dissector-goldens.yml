name: Flow-dissector golden refresh

# Refreshes the kernel-captured `flow_keys` goldens under
# examples/linux_flow_dissector/conformance/ by running upstream
# bpf_flow.c (pinned, fetched at capture time) via BPF_PROG_TEST_RUN on a
# real Linux kernel.
#
# This is DELIBERATELY SEPARATE from the required `ci.yml` gate: minting
# goldens needs bpf()/BPF_PROG_TEST_RUN, which needs CAP_BPF/CAP_SYS_ADMIN
# — the normal gate's container runs unprivileged on purpose (see
# dev-priv.sh and examples/linux_flow_dissector/README.md). The gate only
# ever diffs the goldens already committed here; it never mints them.
#
# Run manually (workflow_dispatch) whenever the goldens need refreshing —
# e.g. after changing oracle/flow_dissector/factory/corpus.txt or the
# pinned bpf_flow.c sha256 in capture.sh, or to pick up a new runner
# kernel version — or let the schedule below catch drift periodically.
# Either way, review the diff before merging: a changed golden is either
# "the corpus/pin changed, expected" or "the kernel disagrees with us,"
# and those need different responses.

on:
  workflow_dispatch: {}
  schedule:
    # Monthly, 04:00 UTC on the 1st. Cheap insurance against silent drift
    # between the pinned dev image and GitHub's rolling ubuntu-latest
    # kernel; not a substitute for a manual refresh after a real change.
    - cron: "0 4 1 * *"

permissions:
  contents: read

jobs:
  refresh-goldens:
    # Real VM (not the sandboxed dev container): privileged BPF/test_run
    # is allowed here, unlike in the unprivileged ci.yml gate.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install clang/llvm + libbpf + kernel UAPI headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libc6-dev linux-libc-dev libbpf-dev

      - name: Run the golden factory (needs CAP_BPF/CAP_SYS_ADMIN)
        run: |
          # bpf() (BPF_PROG_LOAD, BPF_PROG_TEST_RUN) requires real
          # privilege; sudo/root on the runner's own kernel provides it,
          # same role --privileged plays for dev-priv.sh in a container.
          sudo ./oracle/flow_dissector/factory/capture.sh
          # The factory writes as root; hand ownership back to the
          # runner user so later steps (upload/diff) can read it.
          sudo chown -R "$(id -u)":"$(id -g)" \
            examples/linux_flow_dissector/conformance

      - name: Show what changed
        run: |
          git status --porcelain -- examples/linux_flow_dissector/conformance
          git diff --stat -- examples/linux_flow_dissector/conformance || true

      - name: Upload refreshed goldens as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow-dissector-goldens
          path: examples/linux_flow_dissector/conformance/flow_keys.linux-*.golden.json
          if-no-files-found: error
